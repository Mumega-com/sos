repos:
  - repo: local
    hooks:
      - id: lint-imports
        name: lint-imports (structural boundaries)
        entry: lint-imports
        language: system
        pass_filenames: false
        types: [python]
      - id: pytest-contracts
        name: pytest tests/contracts/
        entry: pytest tests/contracts/ -q
        language: system
        pass_filenames: false
        types: [python]
