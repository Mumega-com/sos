product: social-media-manager
slug: social-media-manager
price_monthly: 80000  # cents ($800)
objective_template: "Daily social media management for {customer} across {platforms}"
schedule: "0 8,12,17,20 * * *"  # 4x daily: 8am, noon, 5pm, 8pm

team:
  - role: strategist
    model: gemini-flash
    task: |
      Pick today's post topic for {customer} ({industry}).
      Consider: {topics}, current trends, {brand_voice}.
      Output: topic + angle + target platform + hashtags (5 max).
    max_tokens: 800

  - role: creator
    model: gemma-4-31b
    task: |
      Write a {platform} post about: {topic}
      Brand voice: {brand_voice}
      Platform rules:
      - Twitter/X: max 280 chars, punchy, 1-3 hashtags
      - LinkedIn: professional, 100-300 words, thought leadership
      - Instagram: caption 50-150 words, emoji-friendly, 10-15 hashtags
      - Facebook: conversational, 50-200 words, question or CTA
    max_tokens: 1000
    temperature: 0.85

  - role: reviewer
    model: gemini-flash
    task: |
      Check this {platform} post:
      1. On-brand for {brand_voice}?
      2. Appropriate length for {platform}?
      3. Has CTA or engagement hook?
      4. No typos or awkward phrasing?
      Approve or list fixes.
    max_tokens: 500

  - role: publisher
    tool: social_api
    task: "Post to {platform} via API"

phases:
  - name: strategize
    roles: [strategist]
    output_key: strategy

  - name: create
    roles: [creator]
    input_key: strategy
    output_key: post

  - name: review
    roles: [reviewer]
    input_key: post
    output_key: approved_post
    gate:
      metric: approved
      operator: "=="
      threshold: true

  - name: publish
    roles: [publisher]
    input_key: approved_post
    output_key: post_url

deliverables:
  - type: social_post
    verify: post_live
    frequency: per_run

  - type: email_report
    frequency: weekly
    config:
      template: social_weekly_report
      include: [posts_published, platforms, engagement_summary]

budget:
  tokens_per_run: 2500
  max_retries: 1
  cost_per_run_usd: 0.0
  monthly_cap_usd: 20.0

onboarding_fields:
  - platforms (required, multi-select: twitter, linkedin, instagram, facebook)
  - brand_voice (required)
  - topics (required, comma-separated)
  - industry (required)
  - customer_email (required)
  - social_api_keys (required per platform)
