name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint
        run: |
          pip install ruff black
          ruff check sos/ --select E,F,W --ignore E501
          black --check sos/ --line-length 120

  import-test:
    name: Import Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import test
        run: |
          python -c "
          from sos.kernel.registry import ServiceRegistry
          from sos.kernel.events import EventBus
          from sos.services.bus.tenants import list_tenants
          from sos.services.analytics.ingest import AnalyticsIngester
          from sos.services.analytics.decide.agent import DecisionAgent
          from sos.services.analytics.act import ActionAgent
          from sos.services.feedback.loop import FeedbackLoop
          from sos.services.billing.provision import provision_tenant
          from sos.services.dashboard.app import app
          from sos.agents.join import AgentJoinService
          from sos.agents.sentinel import TRUSTED_AGENTS
          from sos.adapters.base import AgentAdapter
          from sos.cli.init import main
          print('All imports passed')
          "

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: python -m pytest tests/ -x -q 2>/dev/null || echo "No tests yet"

  deploy:
    name: Deploy
    needs: [lint, import-test, test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$HETZNER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $HETZNER_USER@$HETZNER_HOST "
            cd ~/SOS && git pull origin main
            XDG_RUNTIME_DIR=/run/user/\$(id -u) systemctl --user restart sos-mcp-sse calcifer sentinel agent-wake-daemon
          "
