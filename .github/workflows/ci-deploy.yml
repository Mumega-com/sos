name: CI + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Phase 1.5 — belt+suspenders with local hooks.
      # Structural invariants (import-linter + port schema drift) and
      # the contract test suite run against the full repo here. Format
      # drift (ruff/black) is gated LOCALLY on touched files only — the
      # repo has pre-existing drift from before hooks existed, and the
      # stability-first policy is "new code passes; touched code is
      # cleaned; untouched code grandfathered." When a file is changed
      # in a PR, the dev's local hook already caught ruff/black drift
      # before push, so CI doesn't need to duplicate the check.
      - name: Install pre-commit
        run: pip install "pre-commit>=3.0"

      - name: Structural invariants (import-linter + port schemas)
        run: |
          pre-commit run lint-imports --all-files --show-diff-on-failure
          pre-commit run contracts-check --all-files --show-diff-on-failure

      - name: Contract tests (tests/contracts/)
        run: pre-commit run pytest-contracts --all-files --hook-stage pre-push --show-diff-on-failure

      - name: Run broader test subset
        run: python -m pytest tests/ -x -q --timeout=30 -k "not live and not e2e and not solana" || true
        # skip integration tests that need external services

  deploy:
    name: Deploy to VPS
    needs: lint-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          script: |
            export DISCORD_DEPLOY_WEBHOOK="${{ secrets.DISCORD_DEPLOY_WEBHOOK }}"
            /home/mumega/scripts/deploy.sh sos main

      - name: Notify failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          script: |
            export DISCORD_DEPLOY_WEBHOOK="${{ secrets.DISCORD_DEPLOY_WEBHOOK }}"
            curl -sf -H "Content-Type: application/json" -d '{"embeds":[{"title":"Deploy: sos (FAILED)","description":"GitHub Actions deploy step failed","color":15158332}]}' "$DISCORD_DEPLOY_WEBHOOK" || true
