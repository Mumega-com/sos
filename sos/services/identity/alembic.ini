# Alembic config for the Identity service.
#
# Scoped to identity.db (~/.sos/data/identity.db by default). Override
# with IDENTITY_DB_URL. Each service owns its own schema — don't reuse
# this config elsewhere.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
sqlalchemy.url =

file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
