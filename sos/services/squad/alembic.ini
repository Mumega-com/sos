# Alembic config for the Squad service.
#
# Scoped to the squad service's SQLite DB (~/.sos/data/squads.db by
# default). Override with the SQUAD_DB_URL env var. Do NOT share this
# config across services — each service owns its own schema.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
sqlalchemy.url =

# Version files use NNNN_slug.py naming (0001_initial.py etc.).
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
